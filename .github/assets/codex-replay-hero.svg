  <text x="968" y="512" fill="#A7D7B3" font-family="IBM Plex Sans, Arial, sans-serif" font-size="13" letter-spacing="1.1">SKILL SIGNAL</text>
  <text x="968" y="540" fill="#E7E1D6" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17" font-weight="600">frontend-design • explicit</text>

